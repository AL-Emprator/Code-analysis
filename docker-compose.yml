services:
  frontend:
    build:
      context: ./frontend

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    command: npm run dev

  backend:
    build:
      context: ./backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv

    env_file:
      - ./backend/.env

    environment:
      PYTHONUNBUFFERED: "1"

    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

    restart: unless-stopped

volumes:
  frontend_node_modules:
  backend_venv: